name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'constants.py'
      - 'github_api.py'
      - 'metadata.yaml'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy plugin to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          PLUGIN_DIR="/home/tianyu/app/dbx-bot/data/plugins/astrbot_plugin_dbx"

          scp main.py constants.py github_api.py metadata.yaml requirements.txt "root@${HOST}:${PLUGIN_DIR}/"

          # 注入环境变量到 Docker
          ssh "root@${HOST}" bash -s << REMOTE
            cd /home/tianyu/app/dbx-bot
            cat > .env << ENVEOF
          BOT_TOKEN=${BOT_TOKEN}
          BOT_PAT=${BOT_PAT}
          ENVEOF
            docker compose up -d --force-recreate astrbot
          REMOTE
