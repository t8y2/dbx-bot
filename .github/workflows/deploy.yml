name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'constants.py'
      - 'github_api.py'
      - 'metadata.yaml'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy plugin to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_PAT: ${{ secrets.BOT_PAT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          PLUGIN_DIR="/home/tianyu/app/dbx-bot/data/plugins/astrbot_plugin_dbx"

          scp main.py constants.py github_api.py metadata.yaml requirements.txt "root@${HOST}:${PLUGIN_DIR}/"

          # 注入环境变量到 docker-compose.yml 并重启
          ssh "root@${HOST}" BOT_TOKEN="${BOT_TOKEN}" BOT_PAT="${BOT_PAT}" DEEPSEEK_API_KEY="${DEEPSEEK_API_KEY}" bash -s << 'REMOTE'
            cd /home/tianyu/app/dbx-bot
            # 删除旧的 GITHUB_PAT 行（如果有），添加 BOT_TOKEN / BOT_PAT
            sed -i '/GITHUB_PAT/d' docker-compose.yml
            sed -i '/BOT_TOKEN/d' docker-compose.yml
            sed -i '/BOT_PAT/d' docker-compose.yml
            sed -i '/DEEPSEEK_API_KEY/d' docker-compose.yml
            sed -i "/TZ=Asia\/Shanghai/a\      - BOT_TOKEN=${BOT_TOKEN}\n      - BOT_PAT=${BOT_PAT}\n      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}" docker-compose.yml
            docker compose up -d --force-recreate astrbot
          REMOTE
